name: Windows EXE (iteration)

# Fast loop for testing the desktop app in a Windows VM: builds the bare
# Nod.exe (no MSI/installer packaging) and uploads it as a workflow artifact.
# WebView2 ships with Windows 10/11, so the exe runs as-is.
#
#   gh workflow run windows-exe.yml --ref main
#   gh run download <run-id> -n windows-exe

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Shares the release desktop job's cache so builds stay warm.
          key: windows-desktop
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/nod-desktop/package-lock.json
      - name: Build exe (no bundle)
        working-directory: client/nod-desktop
        run: |
          npm ci
          npm run tauri build -- --no-bundle
      - name: Collect exe
        shell: bash
        run: |
          mkdir -p dist
          SEARCH_ROOTS=()
          for root in client/nod-desktop/src-tauri/target client/nod-desktop/target target; do
            [ -d "$root" ] && SEARCH_ROOTS+=("$root")
          done
          if [ "${#SEARCH_ROOTS[@]}" -eq 0 ]; then
            echo "No target directories found after Tauri build." >&2
            exit 1
          fi
          mapfile -t EXE_CANDIDATES < <(
            find "${SEARCH_ROOTS[@]}" -type f -path '*/release/*' \
              \( -iname "Nod.exe" -o -iname "nod-desktop.exe" \) | sort
          )
          if [ "${#EXE_CANDIDATES[@]}" -eq 0 ]; then
            echo "No release exe found. Candidate exe files:" >&2
            find "${SEARCH_ROOTS[@]}" -type f -iname "*.exe" -print | sort >&2
            exit 1
          fi
          cp "${EXE_CANDIDATES[0]}" dist/Nod.exe
          ls -l dist/
      - uses: actions/upload-artifact@v5
        with:
          name: windows-exe
          path: dist/*.exe
          if-no-files-found: error
