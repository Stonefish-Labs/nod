services:
  nod:
    depends_on:
      - nod-apns-relay
    environment:
      NOD_APNS_RELAY_URL: "https://nod-apns-relay:8768"
      NOD_APNS_RELAY_NATIVE_APP_ID: "${NOD_APNS_RELAY_NATIVE_APP_ID:-com.batteryshark.Nod}"
      NOD_APNS_RELAY_CLIENT_CERT_PATH: "/secrets/relay-client.crt"
      NOD_APNS_RELAY_CLIENT_KEY_PATH: "/secrets/relay-client.key"
      NOD_APNS_RELAY_CA_CERT_PATH: "/secrets/relay-ca.crt"

  nod-apns-relay:
    image: nod-apns-relay:local
    build:
      context: ../nod-apns-relay
      dockerfile: Dockerfile
    container_name: nod-apns-relay
    restart: unless-stopped
    expose:
      - "8768"
    env_file:
      - ${NOD_RELAY_SECRETS_ENV:-./secrets/relay.env}
    environment:
      NOD_APNS_RELAY_BIND: "0.0.0.0:8768"
      NOD_APNS_RELAY_SERVER_CERT_PATH: "/secrets/relay-server.crt"
      NOD_APNS_RELAY_SERVER_KEY_PATH: "/secrets/relay-server.key"
      NOD_APNS_RELAY_CLIENT_CA_CERT_PATH: "/secrets/relay-ca.crt"
    volumes:
      - ./secrets:/secrets:ro
